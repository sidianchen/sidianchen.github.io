author: "Sidian Chen"
description: "Research on pore-scale flow, transport, and porous media physics for environmental and energy systems."
url: "https://sidianchen.github.io"
base: ""
lang: "en"

highlighter: rouge
permalink: /news/:year/:month/:day/:title.html

exclude:
  - README.md
  - Makefile
  - Gemfile
  - LICENSE
  - UNLICENSE.txt
  - serve.ps1
  - screenshot.png
  - .bundle
  - .jekyll-cache
  - .local-tools
  - .sass-cache
  - research-group-web-template.zip
  - .template-source
  - .template-research-group-web
  - Gemfile.lock
  - vendor

sass:
  cache: false

collections:
  projects:
    output: true
    permalink: /projects/:name.html

roles:
  - key: researcher
    name: Researcher

front_page_news: 6

navigation:
  - title: Home
    link: /
  - title: Research
    link: /research.html
  - title: Publications
    link: /publications.html
  - title: News
    link: /blog.html
  - title: Code
    link: /code.html

social:
  - title: Email
    icon: envelope
    url: "mailto:sidianchen@email.arizona"
  - title: Google Scholar
    icon: google
    url: "https://scholar.google.com/citations?user=G6Aqt38AAAAJ&hl=en"
  - title: ResearchGate
    icon: registered
    url: "https://www.researchgate.net/profile/Sidian-Chen"
  - title: LinkedIn
    icon: linkedin
    url: "https://www.linkedin.com/in/sidian-chen-4477609b"
  - title: Twitter
    icon: twitter
    url: "https://twitter.com/Sidian_Chen"

plugins:
  - jekyll-feed
