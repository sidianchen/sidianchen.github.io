name: Deploy Jekyll site to Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deploy_primary
        continue-on-error: true
        uses: actions/deploy-pages@v5
      - name: Retry deployment once
        id: deploy_retry
        if: steps.deploy_primary.outcome == 'failure'
        uses: actions/deploy-pages@v5
      - name: Fail if both deployment attempts failed
        if: always()
        run: |
          if [ "${{ steps.deploy_primary.outcome }}" = "success" ] || [ "${{ steps.deploy_retry.outcome }}" = "success" ]; then
            exit 0
          fi
          echo "Deployment failed on both attempts."
          exit 1
